# ─── Vigil — Docker Compose Stack ───
# Spins up the full observability + chaos infrastructure.
# Usage: docker compose up -d

services:
  # ═══════════════════════════════════════════════
  # PostgreSQL — The database (can be stopped to trigger alerts)
  # ═══════════════════════════════════════════════
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: vigil
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vigil" ]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Postgres Exporter — Exposes PG metrics for Prometheus
  # ═══════════════════════════════════════════════
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://vigil:vigil_pass@postgres:5432/vigil?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Flask Chaos App — Simulates production failures
  # ═══════════════════════════════════════════════
  flask-app:
    build:
      context: ./infra/flask-app
      dockerfile: Dockerfile
    environment:
      PORT: "5001"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vigil
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil_pass
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Nginx — Reverse proxy in front of Flask
  # ═══════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Prometheus — Metrics collection + alert rules
  # ═══════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - flask-app
      - postgres-exporter
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Alertmanager — Fires webhooks to Vigil API
  # ═══════════════════════════════════════════════
  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    depends_on:
      - vigil-api
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Elasticsearch — Log storage (single-node dev mode)
  # ═══════════════════════════════════════════════
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Logstash — Ships logs from containers to ES
  # ═══════════════════════════════════════════════
  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    ports:
      - "5044:5044"
    volumes:
      - ./infra/logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  # ═══════════════════════════════════════════════
  # Vigil API — FastAPI backend (the brain)
  # ═══════════════════════════════════════════════
  vigil-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      ELASTICSEARCH_URL: http://elasticsearch:9200
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: vigil
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil_pass
      CHROMA_PERSIST_DIR: /app/chroma_db
    env_file:
      - path: .env
        required: false
    volumes:
      - ./vigil:/app/vigil
      - chroma_data:/app/chroma_db
    depends_on:
      - postgres
    command: [ "uvicorn", "vigil.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  es_data:
  chroma_data:
